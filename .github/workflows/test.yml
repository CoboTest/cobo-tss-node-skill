name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for mock binary)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: bash tests/run-tests.sh
